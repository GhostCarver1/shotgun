

<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Shotgun Games</title>
</head>
<body>
    <h1> SHOTGUN GAMES </h1>
    <h2> Welcome to the Shotgun Game Server! </h2>

    <form id="login_form">
        <label for="user_email">User Email:</label>
        <input type="text" id="user_email" name="user_email">
        <br>
        <label for="user_password">User Password:</label>
        <input type="text" id="user_password" name="user_password">
        <br>
        <input type="submit" value="login">
    </form>

    <form id="permission_form">
        <label for="user_token">User Token:</label>
        <input type="text" id="user_token" name="user_token">
        <label for="user_id">User Id:</label>
        <input type="text" id="user_id" name="user_id">
        <br>
        <input type="submit" value="permission">
    </form>




    <h2> USER_NAME :  <span id="user_name"></span></h2>

    <h2> PERMISSION : <span id="user_permission"></span></h2>

    <h2> JSON </h2>
    <pre id="json_output"></pre>

</body>
</html>




<script>

const login_form = document.getElementById("login_form");
const permission_form = document.getElementById("permission_form");

login_form.addEventListener("submit", function(event) {
    event.preventDefault();

    const email = document.getElementById("user_email").value;
    const password = document.getElementById("user_password").value;

    login(email, password);

});

permission_form.addEventListener("submit", function(event) {
    event.preventDefault();
    const token = document.getElementById("user_token").value;
    const id = document.getElementById("user_id").value;
    permission(id,token);
});



const savedUser = localStorage.getItem("user");

if (savedUser) {
    const userData = JSON.parse(savedUser);
    document.getElementById("user_email").value = userData.user_email;
    document.getElementById("user_password").value = userData.user_password;
    document.getElementById("user_token").value = userData.user_token;
    document.getElementById("user_id").value = userData.user_id;
}

async function permission(id, token) {
    const response = await fetch("/permission", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            token: token
        })
    });

    const data = await response.json();

    document.getElementById("json_output").textContent = JSON.stringify(data, null, 2);

    document.getElementById("user_permission").textContent = data.permission;
}

async function login(email, password)
{
    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

    const data = await response.json();

    document.getElementById("json_output").textContent = JSON.stringify(data, null, 2);

    if (data.status==="success")
    {
        const user = {
            user_email: email,
            user_password: password,
            user_name: data.user_name,
            user_token: data.token,
            user_id: data.user_id
        };

        document.getElementById("user_name").textContent = data.user_name;
        document.getElementById("user_id").value = data.user_id;
        document.getElementById("user_token").value = data.token;
        localStorage.setItem("user", JSON.stringify(user));
    }

}
</script>
