<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Local Web UI</title>
</head>

<body>
<h1>Local Server</h1>

<input id="player_name" placeholder="Enter Player Name">
<button onclick="create_player()">Send</button>

<pre id="player_list"></pre>

<script>
async function create_player() {
    const player_name = document.getElementById("player_name").value;
    const payload = { name: player_name };
    const request = await fetch("/create_player", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });
    const response = await request.text();
    console.log("Response:", response);
    get_players();
}

async function get_players() {

    const response = await fetch("/players");
    const players = await request.json();
    players = players.players || [];
    document.getElementById("player_list").textContent = JSON.stringify(players, null, 2);
}

async function send() {
    const msg = document.getElementById("msg").value;

    const response = await fetch("/echo", {
        method: "POST",
        body: msg
    });

}
</script>

</body>
</html>
