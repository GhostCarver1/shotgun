<script src="authentication/authentication.js"></script>

<script>

const jsonOutput = localStorage.getItem("json_output");
const savedUser = localStorage.getItem("user");

if (savedUser) {
    const userData = JSON.parse(savedUser);
    document.getElementById("user_name").innerHTML = userData.user_email;
    document.getElementById("user_id").innerHTML = userData.user_id;
    document.getElementById("user_token").innerHTML = userData.user_token;

    permission(userData.user_id,userData.user_token);
}

if (jsonOutput) {
    document.getElementById("json_output").innerHTML = JSON.stringify(jsonOutput);
}

function hardRefresh()
{
    location.reload();
}

</script>
