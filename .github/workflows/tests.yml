name: Build Shotgun

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib libpq-dev libsodium-dev nodejs npm
          sudo npm install -g newman
          
      - name: Set Environment
        run: |
          set -a
          source env.test
          set +a

      - name: Do ./test.sh
        run: |
          ./test.sh
        
