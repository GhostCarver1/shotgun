name: Postman API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shotgun_admin
          POSTGRES_PASSWORD: shotgun_password
          POSTGRES_DB: shotgun
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shotgun_admin -d shotgun"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: shotgun
      PGUSER: shotgun_admin
      PGPASSWORD: shotgun_password

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libpq-dev libsodium-dev postgresql-client nodejs npm

      - name: Initialize database
        run: |
          psql "$PGDATABASE" < v2.0/database/init.sql

      - name: Compile server
        run: |
           gcc v2.0/server/*.c v2.0/server/handlers/*.c v2.0/server/helpers/*.c v2.0/database/*.c -o shotgun -lpq -lsodium -pthread

      - name: Start server
        run: |
          ./shotgun &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/ > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Install Newman
        run: |
          npm install -g newman

      - name: Run Postman collection
        run: |
          newman run v2.0/postman/shotgun.postman_collection.json \
            --env-var "base_url=http://localhost:8080"
